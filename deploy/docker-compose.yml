services:
  postgres:
    image: postgres:16-alpine
    container_name: taskhub-postgres
    environment:
      POSTGRES_DB: taskhub
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
    ports:
      # Host port 5433 (not 5432) avoids clashing with any pre-existing local
      # Postgres install; the container still listens on 5432 internally.
      - "5433:5432"
    volumes:
      - taskhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhub -d taskhub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taskhub_postgres_data:
