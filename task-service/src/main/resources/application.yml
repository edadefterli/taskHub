spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:taskhub}
    username: ${DB_USER:taskhub}
    password: ${DB_PASSWORD:taskhub}
  flyway:
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    # Local-dev-only placeholder (>=32 bytes for HS256). Override via JWT_SECRET
    # in any real deployment - never commit a real signing secret.
    secret: ${JWT_SECRET:dev-only-taskhub-jwt-secret-please-change-in-any-real-deploy}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
